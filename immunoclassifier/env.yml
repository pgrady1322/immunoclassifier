name: immunoclassifier
channels:
  - conda-forge
  - bioconda
  - pytorch
  - defaults

dependencies:
  # Core language
  - python=3.11

  # Data stack
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - h5py

  # Single-cell analysis
  - scanpy>=1.9
  - anndata>=0.10
  - scvi-tools>=1.0

  # ML frameworks
  - pytorch>=2.0
  - xgboost>=2.0

  # PyTorch Geometric (for GNN classifier)
  - pyg::pyg>=2.4

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12

  # CLI and utilities
  - click>=8.0
  - tqdm
  - pyyaml
  - rich

  # Testing
  - pytest>=7.0
  - pytest-cov

  - pip
  - pip:
      - celltypist  # Reference method benchmark
      - gdown       # Google Drive downloads for datasets
